<html lang="pt-BR">
  <head>
    <title>Booleans</title>
  </head>
  <body>
    <p>Pedra Papel Tesoura</p>

    <button onclick="jogar('Pedra')">Pedra</button>
    <button onclick="jogar('Papel')">Papel</button>
    <button onclick="jogar('Tesoura')">Tesoura</button>
    <button
      onclick="
        pontuacao.vitorias = 0;
        pontuacao.derrotas = 0;
        pontuacao.empates = 0;
        localStorage.removeItem('pontuacaoSalva');
      "
    >
      Resetar Pontuação
    </button>

    <script>
      let pontuacao = JSON.parse(localStorage.getItem("pontuacaoSalva")) || {
        vitorias: 0,
        empates: 0,
        derrotas: 0,
      };
      
      console.log(pontuacao);

      function jogar(escolhaJogador) {
        const escolhaDoPc = escolhaDoPcDoComp();
        let resultado = "";

        if (escolhaDoPc === escolhaJogador) {
          resultado = "Empatou";
          pontuacao.empates += 1;
        } else if (
          (escolhaJogador === "Pedra" && escolhaDoPc === "Tesoura") ||
          (escolhaJogador === "Papel" && escolhaDoPc === "Pedra") ||
          (escolhaJogador === "Tesoura" && escolhaDoPc === "Papel")
        ) {
          resultado = "Ganhou";
          pontuacao.vitorias += 1;
        } else {
          resultado = "Perdeu";
          pontuacao.derrotas += 1;
        }

        localStorage.setItem("pontuacaoSalva", JSON.stringify(pontuacao));

        alert(
          `Você escolheu ${escolhaJogador}, o PC escolheu ${escolhaDoPc} e o resultado foi que você ${resultado}\nVitorias: ${pontuacao.vitorias}\nDerrotas: ${pontuacao.derrotas}\nEmpates: ${pontuacao.empates}`,
        );
      }

      function escolhaDoPcDoComp() {
        const numAleatorio = Math.random();
        if (numAleatorio < 1 / 3) {
          return "Pedra";
        } else if (numAleatorio < 2 / 3) {
          return "Papel";
        } else {
          return "Tesoura";
        }
      }
    </script>
  </body>
</html>
