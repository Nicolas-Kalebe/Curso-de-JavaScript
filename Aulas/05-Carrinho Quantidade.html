<!doctype html>
<html lang="pt-BR">
  <head>
    <title>Variables</title>
  </head>
  <body>
    <p>Quantidade do Carrinho</p>

    <button
      onclick="console.log(`Quantidade no carrinho: ${quantidadeCarrinho}`)" 
    >
      Mostrar Quantidade
    </button>

    <button onclick="quantidadeCarrinho += 1" ;>Add Carrinho</button>
    <button onclick="quantidadeCarrinho += 2" ;>+2</button>
    <button onclick="quantidadeCarrinho += 3" ;>+3</button>
    <button onclick="quantidadeCarrinho = 0; console.log('Carrinho limpo')" ;>Limpar Carrinho</button>

    <script>
      let quantidadeCarrinho = 0;
    </script>
  </body>
</html>
